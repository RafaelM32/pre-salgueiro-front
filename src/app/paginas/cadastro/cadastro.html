<div #erroMassage class="error-banner">
    <div class="error-content">        
        <div class="error-text">
            <strong class="error-title">ERRO:</strong>
            <span class="error-message">{{ mensagemErro }}</span>
        </div>
    </div>
</div>

<div class="cadastro-container">
  <div class="cadastro-card">
    <div class="cadastro-header">
      <h1>Criar Conta</h1>
      <p>Preencha seus dados para se cadastrar</p>
    </div>

    <form class="cadastro-form" (ngSubmit)="onSubmit()">
      <!-- Foto de perfil -->
      <div class="photo-upload">
        <label for="foto" class="photo-label-clickable">
          <div class="photo-preview">
            <span class="photo-placeholder" *ngIf="!foto">📷</span>
            <img *ngIf="foto" [src]="foto" alt="Foto de perfil" />
          </div>
        </label>
        <input
          type="file"
          id="foto"
          name="foto"
          accept="image/*"
          (change)="onFileSelected($event)"
          class="photo-input"
          #fileInput
        />
        <span class="photo-hint">Clique na imagem para adicionar uma foto</span>
      </div>


      <div class="form-row">
        <div class="form-group">
          <label for="nome">Nome</label>
          <input
            type="text"
            id="nome"
            name="nome"
            placeholder="Digite seu nome"
            [(ngModel)]="nome"
            required
          />
        </div>
      </div>


      <div class="form-row">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Digite seu e-mail"
            [(ngModel)]="email"
            required
          />
          <span class="error-message" *ngIf="erroEmail">{{ erroEmail }}</span>
        </div>

        <div class="form-group">
          <label for="confirmarEmail">Confirmar E-mail</label>
          <input
            type="email"
            id="confirmarEmail"
            name="confirmarEmail"
            placeholder="Confirme seu e-mail"
            [(ngModel)]="confirmarEmail"
            required
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="senha">Senha</label>
          <input
            type="password"
            id="senha"
            name="senha"
            placeholder="Digite sua senha"
            [(ngModel)]="senha"
            required
          />
          <span class="error-message" *ngIf="erroSenha">{{ erroSenha }}</span>
        </div>

        <div class="form-group">
          <label for="confirmarSenha">Confirmar Senha</label>
          <input
            type="password"
            id="confirmarSenha"
            name="confirmarSenha"
            placeholder="Confirme sua senha"
            [(ngModel)]="confirmarSenha"
            required
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="dataNascimento">Data de Nascimento</label>
          <input
            type="date"
            id="dataNascimento"
            name="dataNascimento"
            [(ngModel)]="dataNascimento"
            required
          />
        </div>

        <div class="form-group">
          <label for="cpf">CPF</label>
          <input
            type="text"
            id="cpf"
            name="cpf"
            placeholder="000.000.000-00"
            [(ngModel)]="cpf"
            maxlength="14"
            required
          />
        </div>

        <div class="form-group">
          <label for="telefone">Telefone</label>
          <input
            #telefoneInput
            type="tel"
            id="telefone"
            name="telefone"
            placeholder="(00) 00000-0000"
            [(ngModel)]="telefone"
            (input)="formatTelefone($event)"
            (keypress)="onKeyPressTelefone($event)"
            maxlength="15"
            required
          />
        </div>
      </div>

      

      <div class="form-group">
        <label for="tipoUsuario">Aluno, Professor ou Administrador?</label>
        <select
          id="tipoUsuario"
          name="tipoUsuario"
          [(ngModel)]="tipoUsuario"
          required
        >
          <option value="" disabled selected>Selecione uma opção</option>
          @for( tipos of this.tiposUsuario; track tipos.id){
              <option [value]="tipos.nome">{{ tipos.nome }}</option>
            }

        </select>
      </div>

      <button type="submit" class="btn-primary">Cadastrar</button>
    </form>

    <div class="cadastro-links">
      <span>Já tem uma conta?</span>
      <a routerLink="/" class="link-login">Fazer login</a>
    </div>
  </div>
</div>
