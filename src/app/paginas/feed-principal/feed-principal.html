<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rede Social</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f0f2f5;
}

/* Topo */
.header {
    height: 60px;
    background: white;
    border-bottom: 1px solid #ddd;
    display: flex;
    align-items: center;
    padding: 0 20px;
    position: sticky;
    top: 0;
}

.logo {
    font-size: 24px;
    font-weight: bold;
    color: #1877f2;
}

/* Layout principal */
.container {
    display: flex;
    max-width: 1400px;
    margin: 20px auto;
    gap: 20px;
    padding: 0 15px;
}

/* Menu esquerdo */
.sidebar-left {
    width: 260px;
    background: white;
    border-radius: 10px;
    padding: 20px;
    height: fit-content;
}

.profile {
    text-align: center;
    margin-bottom: 20px;
}

.profile img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    margin-bottom: 10px;
}

.menu-item {
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 5px;
}

.menu-item:hover {
    background: #f0f2f5;
}

/* Feed */
.feed {
    flex: 1;
}

.create-post {
    background: white;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 20px;
}

.create-post textarea {
    width: 100%;
    height: 80px;
    border: none;
    resize: none;
    outline: none;
}

.post {
    background: white;
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
}

.post-header {
    display: flex;
    align-items: center;
    padding: 15px;
}

.post-header img {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    margin-right: 10px;
}

.post-content {
    padding: 0 15px 15px;
}

.post-image {
    width: 100%;
}

.post-actions {
    display: flex;
    justify-content: space-around;
    padding: 10px;
    border-top: 1px solid #eee;
}

.post-actions button {
    border: none;
    background: none;
    cursor: pointer;
    padding: 10px;
    border-radius: 5px;
}

.post-actions button:hover {
    background: #f0f2f5;
}

/* Amigos */
.sidebar-right {
    width: 260px;
    background: white;
    border-radius: 10px;
    padding: 20px;
    height: fit-content;
}

.friend {
    display: flex;
    align-items: center;
    margin-bottom: 15px;
}

.friend img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    margin-right: 10px;
}

.status {
    width: 10px;
    height: 10px;
    background: green;
    border-radius: 50%;
    margin-left: auto;
}

/* Responsivo */
@media (max-width: 1000px) {
    .sidebar-right {
        display: none;
    }
}

@media (max-width: 768px) {
    .sidebar-left {
        display: none;
    }

    .container {
        padding: 0 10px;
    }
}
</style>
</head>

<body>

<header class="header">
    <div class="logo">SocialNet</div>
</header>

<div class="container">

    <!-- Menu Esquerdo -->
    <aside class="sidebar-left">
        <div class="profile">
            <img src="https://via.placeholder.com/90" alt="">
            <h3>Rafael Menezes</h3>
        </div>

        <div class="menu-item">👤 Meu Perfil</div>
        <div class="menu-item">📷 Fotos</div>
        <div class="menu-item">👥 Amigos</div>
        <div class="menu-item">⚙️ Configurações</div>
        <div class="menu-item">🚪 Sair</div>
    </aside>

    <!-- Feed -->
    <main class="feed">

        <div class="create-post">
            <textarea placeholder="No que você está pensando?"></textarea>
        </div>

        <div class="post">
            <div class="post-header">
                <img src="https://via.placeholder.com/45" alt="">
                <div>
                    <strong>João Silva</strong><br>
                    <small>Há 2 horas</small>
                </div>
            </div>

            <div class="post-content">
                Hoje foi um ótimo dia para programar!
            </div>

            <img class="post-image"
                 src="https://picsum.photos/800/400"
                 alt="">

            <div class="post-actions">
                <button>👍 Curtir</button>
                <button>💬 Comentar</button>
                <button>↗ Compartilhar</button>
            </div>
        </div>

        <div class="post">
            <div class="post-header">
                <img src="https://via.placeholder.com/45" alt="">
                <div>
                    <strong>Maria Souza</strong><br>
                    <small>Há 5 horas</small>
                </div>
            </div>

            <div class="post-content">
                Estudando inglês todos os dias.
            </div>

            <div class="post-actions">
                <button>👍 Curtir</button>
                <button>💬 Comentar</button>
                <button>↗ Compartilhar</button>
            </div>
        </div>

    </main>

    <!-- Amigos -->
    <aside class="sidebar-right">
        <h3>Amigos Online</h3>

        <div class="friend">
            <img src="https://via.placeholder.com/40">
            <span>Carlos</span>
            <div class="status"></div>
        </div>

        <div class="friend">
            <img src="https://via.placeholder.com/40">
            <span>Ana</span>
            <div class="status"></div>
        </div>

        <div class="friend">
            <img src="https://via.placeholder.com/40">
            <span>Pedro</span>
            <div class="status"></div>
        </div>

        <div class="friend">
            <img src="https://via.placeholder.com/40">
            <span>Fernanda</span>
            <div class="status"></div>
        </div>

    </aside>

</div>

</body>
</html>
